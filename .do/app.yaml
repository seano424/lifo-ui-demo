# Digital Ocean App Platform Configuration for LIFO AI FastAPI Backend
# Deploy: doctl apps create --spec .do/app.yaml
# Update: doctl apps update <app_id> --spec .do/app.yaml

name: lifo-ai-api
region: ams3

services:
- name: fastapi-backend
  source_dir: lifo_api
  github:
    repo: lifo-ai/lifo-app
    branch: main  # Production deploys from main branch
    deploy_on_push: true

  # UV buildpack handles dependency installation automatically from pyproject.toml and uv.lock
  # No build_command needed - UV will automatically run: uv sync --locked --no-default-groups

  # Run command for production
  run_command: gunicorn -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8080 --worker-tmp-dir /dev/shm --timeout 120 --max-requests 1000 --preload app.main:app

  # Resource allocation
  instance_count: 1
  instance_size_slug: basic-xxs  # Can scale up to professional-xs, professional-s, etc.

  # Health check enabled for production
  health_check:
    http_path: /api/v1/health
    initial_delay_seconds: 30
    period_seconds: 10
    timeout_seconds: 5
    failure_threshold: 3
    success_threshold: 1
  
  # Environment variables
  envs:
  # Application settings
  - key: ENVIRONMENT
    value: production
    type: SECRET
  
  # Database configuration (set in DO App Platform console)
  # - key: DATABASE_URL
  #   type: SECRET
  # - key: SUPABASE_URL
  #   type: SECRET
  # - key: SUPABASE_ANON_KEY
  #   type: SECRET
  # - key: SUPABASE_SERVICE_ROLE_KEY
  #   type: SECRET
  # - key: SECRET_KEY
  #   type: SECRET
  
  - key: ALGORITHM
    value: HS256
    
  - key: ACCESS_TOKEN_EXPIRE_MINUTES
    value: "1440"  # 24 hours
  
  # API Configuration
  - key: API_V1_STR
    value: /api/v1
    
  - key: PROJECT_NAME
    value: "LIFO AI API"
  
  # CORS settings for production
  - key: BACKEND_CORS_ORIGINS
    value: "https://lifo-app.com,https://www.lifo-app.com"
  
  # Google Cloud (set in DO App Platform console)
  # - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
  #   type: SECRET
  
  # # Redis (if using caching)
  # - key: REDIS_URL
  #   value: ""  # Set if using Redis
  #   type: SECRET
  
  # Monitoring and logging
  - key: LOG_LEVEL
    value: INFO
  
  # - key: SENTRY_DSN  # Optional: Set for error tracking in DO console
  #   type: SECRET
  
  # Performance settings
  - key: WORKERS
    value: "2"  # Matches gunicorn -w 2
    
  - key: MAX_WORKERS
    value: "4"
  
  # HTTP settings
  http_port: 8080
  
  # Routes - this exposes the API publicly
  # Let FastAPI handle all routing internally (no path stripping)
  routes:
  - path: /            # Forward all paths to FastAPI without modification

# Optional: Database (if you want managed PostgreSQL)
databases:
- name: lifo-postgres
  engine: PG
  version: "15"
  size: db-s-1vcpu-1gb  # Can scale up
  num_nodes: 1


# Jobs for maintenance tasks (optional)
# Database migrations handled by Supabase, not Alembic
# jobs:
# - name: db-migrate
#   source_dir: lifo_api
#   run_command: alembic upgrade head # Not needed for Supabase
#   instance_count: 1
#   instance_size_slug: basic-xxs
#   kind: PRE_DEPLOY  # Runs before deployment

alerts:
- rule: CPU_UTILIZATION
  value: 80
- rule: MEM_UTILIZATION  
  value: 80
- rule: RESTART_COUNT
  value: 5
