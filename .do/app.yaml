name: lifo-app
region: ams
services:
  - name: web
    github:
      branch: main
      deploy_on_push: true
      repo: lifo-ai/lifo-app
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs
    source_dir: /
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      # Add your other environment variables here as needed
      # - key: NEXT_PUBLIC_SUPABASE_URL
      #   type: SECRET
      # - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
      #   type: SECRET
      # - key: SUPABASE_SERVICE_ROLE_KEY
      #   type: SECRET
      # - key: RESEND_API_KEY
      #   type: SECRET