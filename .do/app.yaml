# Digital Ocean App Platform Configuration for LIFO AI FastAPI Backend
# Deploy: doctl apps create --spec .do/app.yaml
# Update: doctl apps update <app_id> --spec .do/app.yaml

name: lifo-ai-api
region: nyc1

services:
- name: fastapi-backend
  source_dir: lifo_api
  github:
    repo: lifo-ai/lifo-app
    branch: main
    deploy_on_push: true
  
  # Build configuration
  build_command: |
    pip install --upgrade pip
    pip install -r requirements.txt
  
  # Run command for production
  run_command: gunicorn -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8080 --worker-tmp-dir /dev/shm --timeout 120 --max-requests 1000 --preload app.main:app
  
  # Resource allocation
  instance_count: 1
  instance_size_slug: basic-xxs  # Can scale up to professional-xs, professional-s, etc.
  
  # Health check
  health_check:
    http_path: /api/v1/health
    initial_delay_seconds: 30
    period_seconds: 10
    timeout_seconds: 5
    failure_threshold: 3
    success_threshold: 1
  
  # Environment variables
  envs:
  # Application settings
  - key: ENVIRONMENT
    value: production
    type: SECRET
  
  # Database configuration (will be set in DO console)
  - key: DATABASE_URL
    value: ""  # Set this in DO App Platform console as encrypted
    type: SECRET
  
  - key: SUPABASE_URL
    value: ""  # Set in console
    type: SECRET
    
  - key: SUPABASE_ANON_KEY
    value: ""  # Set in console
    type: SECRET
  
  - key: SUPABASE_SERVICE_ROLE_KEY
    value: ""  # Set in console
    type: SECRET
  
  # Security
  - key: SECRET_KEY
    value: ""  # Set in console - generate with: openssl rand -hex 32
    type: SECRET
  
  - key: ALGORITHM
    value: HS256
    
  - key: ACCESS_TOKEN_EXPIRE_MINUTES
    value: "1440"  # 24 hours
  
  # API Configuration
  - key: API_V1_STR
    value: /api/v1
    
  - key: PROJECT_NAME
    value: "LIFO AI API"
  
  # CORS settings for production
  - key: BACKEND_CORS_ORIGINS
    value: "https://lifo-app.com,https://www.lifo-app.com"  # Replace with actual domains
  
  # Google Cloud (if using Vision API)
  - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
    value: ""  # Set in console as base64 encoded service account JSON
    type: SECRET
  
  # # Redis (if using caching)
  # - key: REDIS_URL
  #   value: ""  # Set if using Redis
  #   type: SECRET
  
  # Monitoring and logging
  - key: LOG_LEVEL
    value: INFO
  
  - key: SENTRY_DSN
    value: ""  # Optional: Set for error tracking
    type: SECRET
  
  # Performance settings
  - key: WORKERS
    value: "2"  # Matches gunicorn -w 2
    
  - key: MAX_WORKERS
    value: "4"
  
  # HTTP settings
  http_port: 8080
  
  # Routes - this exposes the API publicly
  routes:
  - path: /
  - path: /api
  - path: /docs  # FastAPI auto-docs
  - path: /redoc  # Alternative docs
  - path: /openapi.json

# Optional: Database (if you want managed PostgreSQL)
databases:
- name: lifo-postgres
  engine: PG
  version: "15"
  size: db-s-1vcpu-1gb  # Can scale up
  num_nodes: 1

# Optional: Static assets (if serving any)
static_sites:
- name: api-docs
  source_dir: docs
  index_document: index.html
  error_document: index.html
  routes:
  - path: /static

# Jobs for maintenance tasks (optional)
jobs:
- name: db-migrate
  source_dir: lifo_api
  run_command: alembic upgrade head
  instance_count: 1
  instance_size_slug: basic-xxs
  kind: PRE_DEPLOY  # Runs before deployment

alerts:
- rule: CPU_UTILIZATION
  value: "80"
- rule: MEM_UTILIZATION  
  value: "80"
- rule: RESTART_COUNT
  value: "5"