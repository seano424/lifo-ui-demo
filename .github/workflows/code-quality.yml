name: Code Quality & Tests

on:
  push:
    branches: [main]
    paths:
      - 'lifo_ai_core/**'
      - 'lifo_api/**'
      - '.github/workflows/code-quality.yml'
      - 'lifo_api/requirements.txt'
      - 'lifo_api/pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - 'lifo_ai_core/**'
      - 'lifo_api/**'
      - '.github/workflows/code-quality.yml'
      - 'lifo_api/requirements.txt'
      - 'lifo_api/pyproject.toml'

jobs:
  quality-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lifo_test
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Setup virtual environment
        run: |
          uv venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagic1

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Install dependencies
        run: |
          uv pip install -r lifo_api/requirements.txt

      - name: Environment setup
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lifo_test" >> $GITHUB_ENV
          echo "ENVIRONMENT=testing" >> $GITHUB_ENV
          echo "DEBUG=true" >> $GITHUB_ENV

      - name: Lint with Ruff
        run: |
          ruff check lifo_ai_core lifo_api --output-format=github
          ruff format --check lifo_ai_core lifo_api

      - name: Type checking with MyPy
        run: |
          echo "::group::MyPy Type Checking"
          mypy lifo_ai_core lifo_api --show-error-codes --pretty 2>&1 | tee mypy-report.txt || echo "MyPy found type errors - see output above"
          echo "::endgroup::"
          
          # Count errors for tracking progress
          error_count=$(grep -c "error:" mypy-report.txt || echo "0")
          echo "Total MyPy errors: $error_count"
          
          # Set as warning instead of failure
          if [ "$error_count" -gt 0 ]; then
            echo "::warning::Found $error_count MyPy type errors. See full output above."
          fi
        continue-on-error: true

      - name: Security scan with Ruff
        run: |
          ruff check --select=S lifo_ai_core lifo_api --ignore=S603,S607,S110,S105,S608,S324,S104 --exclude=tests/,scripts/

      - name: Run tests with coverage
        run: |
          python -m pytest lifo_api/tests/ -v \
            --cov=lifo_ai_core \
            --cov=lifo_api \
            --cov-report=xml \
            --cov-report=term \
            --junit-xml=test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Dependency security audit
        uses: pypa/gh-action-pip-audit@v1.0.8
        with:
          inputs: lifo_api/requirements.txt
