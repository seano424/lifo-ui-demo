name: Code Quality & Tests

on:
  push:
    branches: [main]
    paths:
      - 'lifo_ai_core/**'
      - 'lifo_api/**'
      - '.github/workflows/code-quality.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lifo_ai_core/**'
      - 'lifo_api/**'
      - '.github/workflows/code-quality.yml'

jobs:
  quality-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lifo_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Setup virtual environment
        run: |
          uv venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Quality Checks & Tests
        working-directory: .
        run: |
          uv pip install -r requirements.txt
          ruff check --select I --fix .
          ruff format .
          ruff format --check .

      - name: Run Tests with Coverage
        run: |
          python -m pytest --cov=lifo_ai_core --cov=lifo_api --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

      - name: Security Scans
        run: |
          cd ./lifo_ai_core
          ruff check --select=S . --ignore=S603,S607,S110,S105,S608,S324,S104 --exclude=tests/,scripts/ || echo "Security scan completed"
          cd ../lifo_api
          ruff check --select=S . --ignore=S603,S607,S110,S105,S608,S324,S104 --exclude=tests/,scripts/ || echo "Security scan completed"
          cd ..

      - name: Dependency Security Check
        uses: pypa/gh-action-pip-audit@v1.0.8
        with:
          inputs: requirements.txt
