name: Code Quality & Tests

on:
  push:
    branches: [main]
    paths:
      - 'lifo_api/**'
      - '.github/workflows/code-quality.yml'
      - 'lifo_api/uv.lock'
      - 'lifo_api/pyproject.toml'

  pull_request:
    branches: [main]
    paths:
      - 'lifo_api/**'
      - '.github/workflows/code-quality.yml'
      - 'lifo_api/uv.lock'
      - 'lifo_api/pyproject.toml'

jobs:
  quality-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: lifo_test
          POSTGRES_USER: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Setup virtual environment
        run: |
          uv venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmagic1


      - name: Install dependencies
        run: |
          cd lifo_api
          uv sync --locked --all-extras

      - name: Environment setup
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/lifo_test" >> $GITHUB_ENV
          echo "ENVIRONMENT=testing" >> $GITHUB_ENV
          echo "DEBUG=true" >> $GITHUB_ENV

      - name: Lint with Ruff
        run: |
          cd lifo_api
          uv run ruff check . --output-format=github
          uv run ruff format --check .

      - name: Type checking with MyPy
        run: |
          cd lifo_api
          echo "::group::MyPy Type Checking"
          uv run mypy . --show-error-codes --pretty 2>&1 | tee mypy-report.txt || echo "MyPy found type errors - see output above"
          echo "::endgroup::"

          # Count errors for tracking progress
          error_count=$(grep -c "error:" mypy-report.txt || echo "0")
          echo "Total MyPy errors: $error_count"

          # Set as warning instead of failure
          if [ "$error_count" -gt 0 ]; then
            echo "::warning::Found $error_count MyPy type errors. See full output above."
          fi
        continue-on-error: true

      - name: Security scan with Ruff
        run: |
          cd lifo_api
          uv run ruff check --select=S . --ignore=S603,S607,S110,S105,S608,S324,S104 --exclude=tests/,scripts/

      - name: Run tests with coverage
        run: |
          cd lifo_api
          echo "::group::Running Test Suite"
          uv run python -m pytest tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term \
            --junit-xml=test-results.xml 2>&1 | tee test-report.txt || echo "Tests completed with some failures - see output above"
          echo "::endgroup::"

          # Count test results for tracking
          if [ -f test-results.xml ]; then
            failures=$(grep -o 'failures="[0-9]*"' test-results.xml | grep -o '[0-9]*' || echo "0")
            errors=$(grep -o 'errors="[0-9]*"' test-results.xml | grep -o '[0-9]*' || echo "0")
            echo "Test failures: $failures, Test errors: $errors"

            if [ "$failures" -gt 0 ] || [ "$errors" -gt 0 ]; then
              echo "::warning::Found $failures test failures and $errors test errors. See full output above."
            fi
          fi
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
