[pytest]
# Pytest configuration for LIFO API tests

# Pytest-asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test organization
markers =
    asyncio: mark test as async
    unit: mark test as unit test
    integration: mark test as integration test
    security: mark test as security test
    performance: mark test as performance test
    mobile: mark test as mobile-specific test
    slow: mark test as slow running
    flaky: mark test as potentially flaky

# Output options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:warnings

# Coverage options (when using --cov)
[coverage:run]
source = app
omit =
    */tests/*
    */migrations/*
    */__pycache__/*
    */venv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False
