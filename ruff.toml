# LIFO AI Engine - Unified Ruff Configuration
# Replaces individual ruff.toml files in lifo_api and lifo_ai_core

target-version = "py312"
line-length = 88
extend-exclude = [
    ".venv",
    "migrations",
    "__pycache__",
    "*.pyc",
    ".git",
    ".pytest_cache",
    "*.egg-info",
]

[lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings  
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "UP",  # pyupgrade
    "N",   # pep8-naming
    "S",   # flake8-bandit (security)
    "T20", # flake8-print
]

ignore = [
    "E501",  # line too long (handled by formatter)
    "B008",  # do not perform function calls in argument defaults
    "C901",  # too complex
    "S101",  # use of assert (common in tests)
    "T201",  # print statements (allowed in CLI tools)
    "N818",  # exception name should be named with an Error suffix
]

[lint.per-file-ignores]
"__init__.py" = ["F401"]  # imported but unused
"tests/**/*.py" = ["S101", "S106", "S108"]  # assert, hardcoded passwords in tests
"lifo_ai_core/scripts/**/*.py" = ["T201"]  # print statements in scripts

[lint.isort]
known-first-party = ["lifo_api", "lifo_ai_core"]
known-third-party = ["fastapi", "pydantic", "sqlalchemy", "pandas", "numpy"]

[format]
quote-style = "double"
indent-style = "space"