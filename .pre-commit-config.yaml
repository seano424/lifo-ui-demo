# Pre-commit hooks for LIFO.AI
# Install: uv tool install pre-commit && pre-commit install

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.9
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(lifo-ai-core|lifo-api)/.*\.py$
      # Run the formatter
      - id: ruff-format
        files: ^(lifo-ai-core|lifo-api)/.*\.py$

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        files: ^lifo-ai-core/.*\.py$
        additional_dependencies: [types-all]
        pass_filenames: false
        args: [lifo-ai-core]
      - id: mypy
        files: ^lifo-api/.*\.py$
        additional_dependencies: [types-all]
        pass_filenames: false
        args: [lifo-api]

  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.5
    hooks:
      - id: bandit
        args: [-r, -x, tests/]
        files: ^(lifo-ai-core|lifo-api)/.*\.py$

  - repo: local
    hooks:
      - id: uv-lock-check
        name: Check uv lock files are up to date
        entry: bash -c 'cd lifo-ai-core && uv lock --check && cd ../lifo-api && uv lock --check'
        language: system
        files: ^(lifo-ai-core|lifo-api)/(pyproject\.toml|uv\.lock)$
        pass_filenames: false